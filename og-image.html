<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Image — Venkatesh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #FFFFFF;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #0A0A0A;
  }

  .og {
    width: 1200px;
    height: 630px;
    position: relative;
    padding: 80px 96px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    background: #FFFFFF;
  }

  /* Dot grid */
  .og::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(10,10,10,0.13) 1.2px, transparent 1.6px);
    background-size: 24px 24px;
    -webkit-mask-image: radial-gradient(ellipse 120% 120% at 50% 40%, black 55%, transparent 100%);
    mask-image: radial-gradient(ellipse 120% 120% at 50% 40%, black 55%, transparent 100%);
    pointer-events: none;
  }

  /* Glow orbs */
  .og::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 720px 500px at 8% 12%, rgba(37,99,235,0.22), transparent 60%),
      radial-gradient(ellipse 640px 440px at 95% 85%, rgba(37,99,235,0.20), transparent 60%),
      radial-gradient(ellipse 500px 340px at 50% 50%, rgba(139,92,246,0.10), transparent 65%);
    pointer-events: none;
  }

  .og > * { position: relative; z-index: 1; }

  /* Top row: logo + handle */
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #0A0A0A;
  }
  .logo-mark {
    width: 36px;
    height: 36px;
    background: #0A0A0A;
    border-radius: 8px;
    position: relative;
  }
  .logo-mark::after {
    content: '';
    position: absolute;
    inset: 8px;
    background: #2563EB;
    border-radius: 3px;
  }

  .handle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    color: #6B7280;
    letter-spacing: 0.01em;
  }

  /* Middle: status + headline */
  .body-block { margin-top: 32px; }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    border: 1px solid #E5E7EB;
    background: #FFFFFF;
    border-radius: 100px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: #0A0A0A;
    margin-bottom: 38px;
    box-shadow: 0 1px 2px rgba(10,10,10,0.05);
  }
  .status-dot {
    width: 9px; height: 9px;
    background: #22C55E;
    border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(34,197,94,0.18);
  }

  h1 {
    font-size: 88px;
    font-weight: 600;
    letter-spacing: -0.035em;
    line-height: 0.98;
    color: #0A0A0A;
    max-width: 18ch;
  }
  h1 .accent {
    background: linear-gradient(180deg, #2563EB 0%, #1D4ED8 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .sub {
    margin-top: 28px;
    font-size: 24px;
    color: #6B7280;
    line-height: 1.5;
    max-width: 740px;
    font-weight: 400;
  }

  /* Bottom row: meta pills */
  .meta {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: #0A0A0A;
    background: #FFFFFF;
    border: 1px solid #E5E7EB;
    border-radius: 8px;
    padding: 10px 16px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .pill .k { color: #6B7280; }
  .pill.brand {
    border-color: #2563EB;
    background: #EFF4FF;
    color: #1D4ED8;
  }
</style>
</head>
<body>

<div class="og">
  <div class="top">
    <div class="logo">
      <span class="logo-mark"></span>
      venkatesh.dev
    </div>
    <div class="handle">@Venkateshvenki404224</div>
  </div>

  <div class="body-block">
    <div class="status">
      <span class="status-dot"></span>
      Available for backend engagements
    </div>
    <h1>Backend infrastructure for the <span class="accent">Frappe ecosystem</span>.</h1>
    <p class="sub">
      Open-source tooling, production systems, and AI-assisted workflows — built in Bengaluru.
    </p>
  </div>

  <div class="meta">
    <span class="pill"><span class="k">stack</span> Python · Frappe · Docker</span>
    <span class="pill"><span class="k">infra</span> MariaDB · Redis · WireGuard</span>
    <span class="pill brand">4+ years shipping</span>
  </div>
</div>

</body>
</html>
